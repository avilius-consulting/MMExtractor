syntax = "proto3";
package metadata;

service MetadataExtractor {
    rpc ExtractFromUrl (ExtractRequest) returns (ExtractResponse);
}

message ExtractRequest {
    string image_url = 1;
}

message ExtractResponse {
    string format = 1;
    int32 width = 2;
    int32 height = 3;
    int64 size_bytes = 4;
}
