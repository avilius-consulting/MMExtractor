name: Continuous Integration

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run Code Linter / Vet
        run: go vet ./...

      - name: Run Tests
        run: go test -v ./...

      - name: Test Docker Build Compatibility
        name: Verify Docker compilation works
        run: docker build -t test-build:local .